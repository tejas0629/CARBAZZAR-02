{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl font-semibold mb-4 text-center text-red-600">Register</h2>

  <form method="post" class="space-y-3">
    {% csrf_token %}
    
    <div>
      <label class="block mb-1 text-gray-700">Name</label>
      <input type="text" name="name" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Email</label>
      <input type="email" name="email" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Password</label>
      <input type="password" name="password" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <button type="submit"
            class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 transition duration-200">
      Register
    </button>
  </form>
</div>

{% endblock %}
