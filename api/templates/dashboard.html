{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-bold mb-4 text-red-600">Admin Dashboard</h2>

  <div class="flex justify-end mb-4">
    <a href="{% url 'add_vehicle' %}" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">+ Add Vehicle</a>
  </div>

  <table class="w-full table-auto border-collapse border border-gray-200">
    <thead class="bg-gray-100">
      <tr>
        <th class="border p-2">ID</th>
        <th class="border p-2">Name</th>
        <th class="border p-2">Brand</th>
        <th class="border p-2">Price</th>
        <th class="border p-2">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for v in vehicles %}
      <tr class="hover:bg-gray-50">
        <td class="border p-2">{{ v.id }}</td>
        <td class="border p-2">{{ v.name }}</td>
        <td class="border p-2">{{ v.brand }}</td>
        <td class="border p-2">₹{{ v.price_min }} - ₹{{ v.price_max }}</td>
        <td class="border p-2 text-center">
          <a href="{% url 'update_vehicle' v.id %}" class="text-blue-600 hover:underline">Edit</a> |
          <a href="{% url 'delete_vehicle' v.id %}" class="text-red-600 hover:underline">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="5" class="text-center text-gray-500 p-4">No vehicles found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
