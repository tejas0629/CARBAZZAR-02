{% extends 'base.html' %}
{% block content %}

<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl font-semibold mb-4">Compare Cars</h2>

  <form method="post" class="mb-4">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
      <select name="car_a" class="border p-2 rounded">
        {% for c in cars %}
          <option value="{{ c.id }}">{{ c.brand }} - {{ c.name }}</option>
        {% endfor %}
      </select>

      <select name="car_b" class="border p-2 rounded">
        {% for c in cars %}
          <option value="{{ c.id }}">{{ c.brand }} - {{ c.name }}</option>
        {% endfor %}
      </select>
    </div>

    <button class="mt-3 bg-red-600 text-white px-4 py-2 rounded">Compare</button>
  </form>

  {% if result %}
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for r in result %}
      <div class="bg-gray-50 p-4 rounded">
        <h4 class="font-bold">{{ r.name }} ({{ r.brand }})</h4>
        <p>Safety: {{ r.safety_rating }}</p>
        <p>Price: ₹{{ r.price_min }} - ₹{{ r.price_max }}</p>
      </div>
    {% endfor %}
  </div>
  {% endif %}
</div>

{% endblock %}
