{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow text-center">
  <h2 class="text-xl font-bold mb-4 text-red-600">Delete Vehicle</h2>
  <p>Are you sure you want to delete <strong>{{ vehicle.name }}</strong> ({{ vehicle.brand }})?</p>
  <form method="POST" class="mt-6">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded mr-2">Yes, Delete</button>
    <a href="{% url 'dashboard' %}" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Cancel</a>
  </form>
</div>
{% endblock %}
