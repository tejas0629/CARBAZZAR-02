{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-semibold mb-4 text-center text-red-600">Login</h2>

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block mb-1 text-gray-700">Username</label>
      <input type="text" name="username" required
             class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-red-500"
             placeholder="Enter your username">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Password</label>
      <input type="password" name="password" required
             class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <button type="submit"
            class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 transition duration-200">
      Login
    </button>
  </form>

  <p class="text-center text-sm text-gray-600 mt-4">
    Don’t have an account?
    <a href="{% url 'register' %}" class="text-red-600 hover:underline">Register here</a>.
  </p>
</div>

{% endblock %}
