{% extends 'base.html' %}
{% block content %}

<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-semibold mb-4 text-center text-red-600">Sell Your Car</h2>

  <form method="post" enctype="multipart/form-data" class="space-y-3">
    {% csrf_token %}
    
    <div>
      <label class="block mb-1 text-gray-700">Vehicle Name</label>
      <input type="text" name="name" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Brand</label>
      <input type="text" name="brand" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Kilometres Run</label>
      <input type="number" name="kms" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Insurance Claimed?</label>
      <select name="insurance" required
              class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Contact Number</label>
      <input type="text" name="contact" required
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Address</label>
      <textarea name="address" required
                class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500"></textarea>
    </div>

    <div>
      <label class="block mb-1 text-gray-700">Car Image</label>
      <input type="file" name="image" accept="image/*"
             class="w-full border p-2 rounded focus:ring-2 focus:ring-red-500">
    </div>

    <button type="submit"
            class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 transition duration-200">
      Submit
    </button>
  </form>
</div>

{% endblock %}
